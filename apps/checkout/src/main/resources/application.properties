spring.application.name=checkout

# EP-001 — Banco H2 em memória (suficiente para a demonstração acadêmica)
spring.datasource.url=jdbc:h2:mem:checkout;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Console web do H2 em http://localhost:8080/h2-console (JDBC URL: jdbc:h2:mem:checkout)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
